<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 { color: #00ffcc; }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            width: 60%;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover { background: #16a34a; }
    </style>
</head>
<body>

<h1>🤖 AI Document Analyzer</h1>

<div class="card">
    <input type="file" id="fileInput"><br><br>
    <button onclick="upload()">Analyze</button>
</div>

<div class="card">
    <h3>📄 Summary</h3>
    <p id="summary"></p>
</div>

<div class="card">
    <h3>😊 Sentiment</h3>
    <p id="sentiment"></p>
</div>

<div class="card">
    <h3>🧠 Entities</h3>
    <div id="entities"></div>
</div>

<script>

const API_BASE = "https://doc-analyzer-wfsh.onrender.com";

async function upload() {

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file");

    const reader = new FileReader();

    reader.onload = async function() {

        const base64 = reader.result.split(",")[1];

        const res = await fetch(API_BASE + "/api/document-analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": "sk_track2_987654321"
            },
            body: JSON.stringify({
                fileName: file.name,
                fileType: file.name.split('.').pop(),
                fileBase64: base64
            })
        });

        const data = await res.json();

        document.getElementById("summary").innerText = data.summary;
        document.getElementById("sentiment").innerText = data.sentiment;

        document.getElementById("entities").innerText =
            JSON.stringify(data.entities, null, 2);
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
