</head>
<body>

<h1>🤖 AI Document Analyzer</h1>

<div class="card">
    <input type="file" id="fileInput"><br><br>
    <button onclick="upload()">Analyze</button>
</div>

<div class="card">
    <h3>📄 Summary</h3>
    <p id="summary"></p>
</div>

<div class="card">
    <h3>😊 Sentiment</h3>
    <p id="sentiment"></p>
</div>

<div class="card">
    <h3>🧠 Entities</h3>
    <div id="entities"></div>
</div>

<script>

const API_BASE = "https://doc-analyzer-wfsh.onrender.com";

// 🔥 CLEAN FUNCTION
function cleanList(arr) {
    if (!arr) return "None";

    return arr
        .map(x => x.replace(/[^a-zA-Z0-9 ]/g, "")) // remove symbols
        .filter(x => x.length > 2) // remove short junk
        .filter(x => !["the","and","for","with","this","that","on","are","is"].includes(x.toLowerCase()))
        .filter((v, i, a) => a.indexOf(v) === i) // remove duplicates
        .join(", ") || "None";
}

async function upload() {

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file");

    document.getElementById("summary").innerHTML = "⏳ Processing...";

    const reader = new FileReader();

    reader.onload = async function() {

        const base64 = reader.result.split(",")[1];

        try {
            const res = await fetch(API_BASE + "/api/document-analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": "sk_track2_987654321"
                },
                body: JSON.stringify({
                    fileName: file.name,
                    fileType: file.name.split('.').pop(),
                    fileBase64: base64
                })
            });

            const data = await res.json();

            // Summary
            document.getElementById("summary").innerText = data.summary || "No summary";

            // Sentiment
            document.getElementById("sentiment").innerText = data.sentiment || "Unknown";

            // 🔥 CLEAN ENTITIES OUTPUT
            document.getElementById("entities").innerHTML = `
                <div class="section">
                    <b>👤 Names:</b><br>
                    ${cleanList(data.entities?.names)}
                </div>

                <div class="section">
                    <b>📅 Dates:</b><br>
                    ${cleanList(data.entities?.dates)}
                </div>

                <div class="section">
                    <b>🏷 Keywords:</b><br>
                    ${cleanList(data.entities?.keywords)}
                </div>
            `;

        } catch (err) {
            alert("Server error ⚠️");
        }
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
