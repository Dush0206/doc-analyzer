<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 { color: #00ffcc; }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            width: 60%;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover { background: #16a34a; }

        .title { color: #00ffcc; }

        #highlightedText {
            text-align: left;
            white-space: pre-wrap;
        }

        .loading {
            color: #facc15;
            font-weight: bold;
        }

        .user {
            color: #38bdf8;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>🤖 AI Document Analyzer</h1>

<p class="user" id="userStatus">Not logged in</p>

<!-- 🔐 LOGIN -->
<div class="card">
    <h3 class="title">🔐 Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<!-- 📂 UPLOAD -->
<div class="card">
    <input type="file" id="fileInput"><br>
    <button onclick="upload()">Analyze</button>
</div>

<div class="card">
    <h3 class="title">📄 Summary</h3>
    <p id="summary"></p>
</div>

<div class="card">
    <h3 class="title">😊 Sentiment</h3>
    <p id="sentiment"></p>
</div>

<div class="card">
    <h3 class="title">🧠 Entities</h3>
    <div id="entities"></div>
</div>

<div class="card">
    <h3 class="title">📌 Key Points</h3>
    <div id="keypoints"></div>
</div>

<div class="card">
    <h3 class="title">❓ Questions</h3>
    <div id="questions"></div>
</div>

<div class="card">
    <h3 class="title">📄 Full Text</h3>
    <div id="highlightedText"></div>
</div>

<script>

// 🔥 IMPORTANT → change if deployed
const API_BASE = "https://doc-analyzer-wfsh.onrender.com" // keep empty for same domain OR use full URL

let token = localStorage.getItem("token") || "";
let currentUser = localStorage.getItem("user") || "";

// 🔄 Update UI
function updateUserUI() {
    document.getElementById("userStatus").innerText =
        token ? "Logged in as: " + currentUser : "Not logged in";
}

// 🔐 REGISTER
async function register() {
    const username = usernameEl.value;
    const password = passwordEl.value;

    const res = await fetch(API_BASE + "/api/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    alert(data.message || data.error);
}

// 🔐 LOGIN
async function login() {
    const username = usernameEl.value;
    const password = passwordEl.value;

    const res = await fetch(API_BASE + "/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.access_token) {
        token = data.access_token;
        localStorage.setItem("token", token);
        localStorage.setItem("user", username);
        currentUser = username;
        updateUserUI();
        alert("Login successful ✅");
    } else {
        alert("Login failed ❌");
    }
}

// 🚀 ANALYZE
async function upload() {

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select a file");

    if (!token) return alert("Login first");

    document.getElementById("summary").innerHTML =
        "<span class='loading'>⏳ Processing...</span>";

    const reader = new FileReader();

    reader.onload = async function() {

        const base64 = reader.result.split(",")[1];

        try {
            const res = await fetch(API_BASE + "/api/document-analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    fileName: file.name,
                    fileType: file.name.split('.').pop(),
                    fileBase64: base64
                })
            });

            const data = await res.json();

            document.getElementById("summary").innerText = data.summary || "";
            document.getElementById("sentiment").innerText = data.sentiment || "";

            // ✅ FULL ENTITIES
            document.getElementById("entities").innerHTML = `
                <b>Names:</b> ${data.entities?.names?.join(", ") || "None"} <br>
                <b>Dates:</b> ${data.entities?.dates?.join(", ") || "None"} <br>
                <b>Keywords:</b> ${data.entities?.keywords?.join(", ") || "None"}
            `;

            // ✅ SAFE KEY POINTS
            document.getElementById("keypoints").innerHTML =
                (data.key_points || []).map(p => "• " + p).join("<br>") || "None";

            // ✅ SAFE QUESTIONS
            document.getElementById("questions").innerHTML =
                (data.questions || []).map(q => "• " + q).join("<br>") || "None";

            document.getElementById("highlightedText").innerText = data.text || "";

        } catch (err) {
            alert("Server error ⚠️");
        }
    };

    reader.readAsDataURL(file);
}

// 🔄 Restore login
updateUserUI();

</script>

</body>
</html>
