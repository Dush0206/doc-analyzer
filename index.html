<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>

    <!-- Prevent cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 { color: #00ffcc; }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            width: 60%;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover { background: #16a34a; }

        #summary {
            white-space: pre-line;
        }

        .section {
            text-align: left;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>🤖 AI Document Analyzer</h1>

<div class="card">
    <input type="file" id="fileInput"><br><br>
    <button onclick="upload()">Analyze</button>
</div>

<div class="card">
    <h3>📄 Summary</h3>
    <p id="summary"></p>
</div>

<div class="card">
    <h3>😊 Sentiment</h3>
    <p id="sentiment"></p>
</div>

<div class="card">
    <h3>🧠 Entities</h3>
    <div id="entities"></div>
</div>

<script>

const API_BASE = "https://doc-analyzer-wfsh.onrender.com";


// 🔥 FINAL CLEAN FUNCTION (PRO VERSION)
function cleanList(arr, type = "text") {
    if (!arr || arr.length === 0) return "None";

    const stopWords = [
        "the","and","for","with","this","that","on","are","is",
        "artificial","intelligence","companies","company","data"
    ];

    return arr
        .map(x => x.replace(/[^a-zA-Z0-9 ]/g, "").trim())
        .filter(x => x.length > 2)
        .filter(x => !stopWords.includes(x.toLowerCase()))
        .filter(x => type === "names" ? x[0] === x[0].toUpperCase() : true)
        .filter((v, i, a) => a.indexOf(v) === i)
        .join(", ") || "None";
}


// 📅 CLEAN DATES (ONLY NUMBERS LIKE 2025)
function cleanDates(arr) {
    if (!arr) return "None";

    return arr
        .filter(x => /^\d{2,4}$/.test(x))
        .filter((v, i, a) => a.indexOf(v) === i)
        .join(", ") || "None";
}


async function upload() {

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select file");

    document.getElementById("summary").innerHTML = "⏳ Processing...";

    const reader = new FileReader();

    reader.onload = async function() {

        const base64 = reader.result.split(",")[1];

        try {
            const res = await fetch(API_BASE + "/api/document-analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": "sk_track2_987654321"
                },
                body: JSON.stringify({
                    fileName: file.name,
                    fileType: file.name.split('.').pop(),
                    fileBase64: base64
                })
            });

            const data = await res.json();

            // Summary
            document.getElementById("summary").innerText =
                data.summary || "No summary";

            // Sentiment
            document.getElementById("sentiment").innerText =
                data.sentiment || "Unknown";

            // ✅ CLEAN UI OUTPUT
            document.getElementById("entities").innerHTML = `
                <div class="section">
                    <b>👤 Names:</b><br>
                    ${cleanList(data.entities?.names, "names")}
                </div>

                <div class="section">
                    <b>📅 Dates:</b><br>
                    ${cleanDates(data.entities?.dates)}
                </div>

                <div class="section">
                    <b>🏷 Keywords:</b><br>
                    ${cleanList(data.entities?.keywords)}
                </div>
            `;

        } catch (err) {
            alert("Server error ⚠️");
        }
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
