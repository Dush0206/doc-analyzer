<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 30px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            width: 60%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        button {
            padding: 12px 22px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        input {
            margin: 10px;
        }

        #highlightedText {
            text-align: left;
            line-height: 1.6;
        }

        .title {
            color: #00ffcc;
        }

        .loading {
            color: #facc15;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🤖 AI Document Analyzer</h1>

<div class="card">
    <input type="file" id="fileInput">
    <br>
    <button onclick="upload()">Analyze</button>
    <button onclick="downloadResult()">Download</button>
</div>

<div class="card">
    <h3 class="title">📄 Summary</h3>
    <p id="summary"></p>
</div>

<div class="card">
    <h3 class="title">😊 Sentiment</h3>
    <p id="sentiment"></p>
</div>

<div class="card">
    <h3 class="title">🧠 Entities</h3>
    <div id="entities"></div>
</div>

<div class="card">
    <h3 class="title">📄 Highlighted Text</h3>
    <div id="highlightedText"></div>
</div>

<!-- ✅ NEW HISTORY SECTION -->
<div class="card">
    <h3 class="title">📜 History</h3>
    <div id="history"></div>
</div>

<script>

// 🔥 Safe highlight
function safeHighlight(text, word, color) {
    const regex = new RegExp(`\\b${word}\\b`, "gi");
    return text.replace(regex, `<span style="background:${color}; color:black;">${word}</span>`);
}

// 🔥 Highlight function
function highlightText(text, entities) {
    let highlighted = text;

    entities.names.forEach(name => {
        highlighted = safeHighlight(highlighted, name, "yellow");
    });

    entities.organizations.forEach(org => {
        highlighted = safeHighlight(highlighted, org, "lightblue");
    });

    entities.dates.forEach(date => {
        highlighted = safeHighlight(highlighted, date, "lightgreen");
    });

    entities.amounts.forEach(amount => {
        highlighted = safeHighlight(highlighted, amount, "pink");
    });

    if (entities.keywords) {
        entities.keywords.forEach(keyword => {
            highlighted = safeHighlight(highlighted, keyword, "orange");
        });
    }

    return highlighted;
}

// 🚀 Upload
async function upload() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    document.getElementById("summary").innerHTML = "<span class='loading'>⏳ Analyzing...</span>";
    document.getElementById("sentiment").innerHTML = "";
    document.getElementById("entities").innerHTML = "";
    document.getElementById("highlightedText").innerHTML = "";

    const reader = new FileReader();

    reader.onload = async function() {
        const base64 = reader.result.split(",")[1];

        const res = await fetch("https://doc-analyzer-wfsh.onrender.com/api/document-analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": "test123"
            },
            body: JSON.stringify({
                fileName: file.name,
                fileType: file.name.split('.').pop(),
                fileBase64: base64
            })
        });

        const data = await res.json();

        document.getElementById("summary").innerText = data.summary;

        let emoji = "😐";
        if (data.sentiment === "POSITIVE") emoji = "😊";
        if (data.sentiment === "NEGATIVE") emoji = "😞";

        document.getElementById("sentiment").innerHTML = `${emoji} ${data.sentiment}`;

        document.getElementById("entities").innerHTML = `
            <b>👤 Names:</b> ${data.entities.names.join(", ") || "None"} <br><br>
            <b>🏢 Organizations:</b> ${data.entities.organizations.join(", ") || "None"} <br><br>
            <b>📅 Dates:</b> ${data.entities.dates.join(", ") || "None"} <br><br>
            <b>💰 Amounts:</b> ${data.entities.amounts.join(", ") || "None"} <br><br>
            <b>🔑 Keywords:</b> ${data.entities.keywords ? data.entities.keywords.join(", ") : "None"}
        `;

        const highlighted = highlightText(data.text, data.entities);
        document.getElementById("highlightedText").innerHTML = highlighted;

        // 🔥 Load history after analysis
        loadHistory();
    };

    reader.readAsDataURL(file);
}

// 📜 Load history
async function loadHistory() {
    const res = await fetch("https://doc-analyzer-wfsh.onrender.com/api/history");
    const data = await res.json();

    let html = "";

    data.forEach(item => {
        html += `
            <div style="border-bottom:1px solid gray; margin-bottom:10px; padding:5px;">
                <b>📄 ${item.fileName}</b><br>
                <small>${item.summary.substring(0, 80)}...</small>
            </div>
        `;
    });

    document.getElementById("history").innerHTML = html;
}

// 📥 Download
function downloadResult() {
    const summary = document.getElementById("summary").innerText;
    const sentiment = document.getElementById("sentiment").innerText;
    const entities = document.getElementById("entities").innerText;

    const content = `
SUMMARY:
${summary}

SENTIMENT:
${sentiment}

ENTITIES:
${entities}
`;

    const blob = new Blob([content], { type: "text/plain" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "analysis.txt";
    a.click();
}

// 🔥 Load history on page load
window.onload = loadHistory;

</script>

</body>
</html>
