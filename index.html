</head>
<body>

<h1>🤖 AI Document Analyzer</h1>
<p class="user" id="userStatus">Not logged in</p>

<div class="card">
    <h3>🔐 Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<div class="card">
    <input type="file" id="fileInput"><br>
    <button onclick="upload()">Analyze</button>
</div>

<div class="card">
    <h3>📄 Summary</h3>
    <p id="summary"></p>
</div>

<div class="card">
    <h3>😊 Sentiment</h3>
    <p id="sentiment"></p>
</div>

<div class="card">
    <h3>🧠 Entities</h3>
    <div id="entities"></div>
</div>

<div class="card">
    <h3>📌 Key Points</h3>
    <div id="keypoints"></div>
</div>

<div class="card">
    <h3>❓ Questions</h3>
    <div id="questions"></div>
</div>

<div class="card">
    <h3>📄 Full Text</h3>
    <div id="highlightedText"></div>
</div>

<script>

const API_BASE = "https://doc-analyzer-wfsh.onrender.com";

let usernameEl, passwordEl;
let token = "";
let currentUser = "";

// UI update
function updateUserUI() {
    document.getElementById("userStatus").innerText =
        token ? "Logged in as: " + currentUser : "Not logged in";
}

// REGISTER
async function register() {
    const res = await fetch(API_BASE + "/api/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: usernameEl.value,
            password: passwordEl.value
        })
    });

    const data = await res.json();
    alert(data.message || data.error);
}

// LOGIN
async function login() {
    const res = await fetch(API_BASE + "/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: usernameEl.value,
            password: passwordEl.value
        })
    });

    const data = await res.json();
    console.log("LOGIN:", data);

    if (data.access_token) {
        token = data.access_token;
        currentUser = usernameEl.value;

        localStorage.setItem("token", token);
        localStorage.setItem("user", currentUser);

        updateUserUI();
        alert("Login successful ✅");
    } else {
        alert("Login failed ❌");
    }
}

// ANALYZE (🔥 FINAL FIX HERE)
async function upload() {

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Select a file");

    // 🔥 ALWAYS GET LATEST TOKEN
    const storedToken = localStorage.getItem("token");

    if (!storedToken) {
        alert("Login first");
        return;
    }

    document.getElementById("summary").innerText = "⏳ Processing...";

    const reader = new FileReader();

    reader.onload = async function() {

        const base64 = reader.result.split(",")[1];

        try {
            const res = await fetch(API_BASE + "/api/document-analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + storedToken
                },
                body: JSON.stringify({
                    fileName: file.name,
                    fileType: file.name.split('.').pop(),
                    fileBase64: base64
                })
            });

            const data = await res.json();

            document.getElementById("summary").innerText = data.summary || "";
            document.getElementById("sentiment").innerText = data.sentiment || "";

            document.getElementById("entities").innerHTML = `
                <b>Names:</b> ${data.entities?.names?.join(", ") || "None"} <br>
                <b>Dates:</b> ${data.entities?.dates?.join(", ") || "None"} <br>
                <b>Keywords:</b> ${data.entities?.keywords?.join(", ") || "None"}
            `;

            document.getElementById("keypoints").innerHTML =
                (data.key_points || []).map(p => "• " + p).join("<br>") || "None";

            document.getElementById("questions").innerHTML =
                (data.questions || []).map(q => "• " + q).join("<br>") || "None";

            document.getElementById("highlightedText").innerText = data.text || "";

        } catch (err) {
            console.error(err);
            alert("Server error ⚠️");
        }
    };

    reader.readAsDataURL(file);
}

// LOAD INIT
window.onload = () => {
    usernameEl = document.getElementById("username");
    passwordEl = document.getElementById("password");

    token = localStorage.getItem("token") || "";
    currentUser = localStorage.getItem("user") || "";

    updateUserUI();
};

</script>

</body>
</html>
